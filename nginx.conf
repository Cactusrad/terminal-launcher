server {
    # Default vhost HTTP : redirige vers HTTPS pour accès direct sur LAN
    listen 80 default_server;
    return 301 https://$host$request_uri;
}

# Vhost dédié terminal.sharpi.ca : entrée via Cloudflare → droplet nginx →
# tunnel SSH .200:9103. Le TLS est géré côté droplet (Let's Encrypt) + CF Access
# fait l'auth Pierre uniquement. Ici on reçoit du HTTP propre via le tunnel,
# pas de redirect HTTPS sinon boucle (le request arrive déjà via HTTPS public).
server {
    listen 80;
    server_name terminal.sharpi.ca;

    location /terminal-ws/ {
        proxy_pass http://host.docker.internal:7681/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /terminal-api/ {
        proxy_pass http://host.docker.internal:7681/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://terminal-launcher:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ttyd webterminal (tmux session "webterminal", port hôte 9021) exposé en HTTPS.
# En HTTP nu (http://.200:9021) le navigateur bloque navigator.clipboard, donc la
# copie via OSC 52 (Claude Code / tmux) n'atterrit jamais. En contexte sécurisé
# (https://.200:9443) elle fonctionne. ttyd reste servi à la racine -> pas besoin
# de --base-path, tout (/, /token, /ws) est proxifié à la racine.
server {
    listen 9443 ssl;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://host.docker.internal:9021;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

server {
    listen 443 ssl;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Terminal WebSocket proxy (wss:// -> ws://host:7681)
    location /terminal-ws/ {
        proxy_pass http://host.docker.internal:7681/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Terminal server REST API proxy (sessions endpoint)
    location /terminal-api/ {
        proxy_pass http://host.docker.internal:7681/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Main app
    location / {
        proxy_pass http://terminal-launcher:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
