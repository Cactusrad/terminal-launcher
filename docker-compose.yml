services:
  homepage:
    build: .
    container_name: homepage
    restart: unless-stopped
    ports:
      - "1000:80"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - homepage-data:/data
      - /home/cactus/claude:/home/cactus/claude:ro
      - /tmp/terminal-logs:/tmp/terminal-logs:ro
      - /tmp/dtach-sessions:/tmp/dtach-sessions:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  homepage-data:
