services:
  homepage:
    build: .
    container_name: homepage
    restart: unless-stopped
    ports:
      - "1000:80"
    volumes:
      - homepage-data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  homepage-data:
