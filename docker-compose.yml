version: '3.8'

services:
  homepage:
    build: .
    container_name: homepage
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - homepage-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  homepage-data:
