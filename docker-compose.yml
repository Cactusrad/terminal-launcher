services:
  terminal-launcher:
    build: .
    container_name: terminal-launcher
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - HOST_IP=${HOST_IP:?HOST_IP must be set in .env}
      - TERMINAL_SERVER_HOST=${TERMINAL_SERVER_HOST:-${HOST_IP}}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - BUGS_API_URL=${BUGS_API_URL:-}
      - BUGS_API_KEY=${BUGS_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-}
      - SECRETS_URL=${SECRETS_URL:-}
      - SECRETS_TOKEN=${SECRETS_TOKEN:-}
    volumes:
      - launcher-data:/data
      - /home/cactus/claude:/home/cactus/claude:rw
      - /home/cactus/.claude:/home/cactus/.claude:ro
      - /tmp/terminal-logs:/tmp/terminal-logs:ro
      - /tmp/dtach-sessions:/tmp/dtach-sessions:ro
      - /home/cactus/.ssh/github_key:/home/cactus/.ssh/github_key:ro
      - /home/cactus/.ssh/known_hosts:/home/cactus/.ssh/known_hosts:ro

  nginx:
    image: nginx:alpine
    container_name: terminal-launcher-nginx
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - terminal-launcher

volumes:
  launcher-data:
