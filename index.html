<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cactus Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 2.5rem; font-weight: 300; margin-bottom: 8px; }
        header h1 span { color: #4ade80; }
        header p { color: #94a3b8; font-size: 1rem; }

        .top-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .top-btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-admin {
            background: rgba(255,255,255,0.1);
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .top-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: grab;
            user-select: none;
        }
        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .card.dragging { opacity: 0.5; cursor: grabbing; }
        .card-icon {
            width: 60px; height: 60px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        .card h2 { font-size: 1.2rem; font-weight: 500; margin-bottom: 6px; }
        .card p { color: #94a3b8; font-size: 0.85rem; margin-bottom: 12px; }
        .card .port {
            font-size: 0.75rem;
            color: #64748b;
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 15px;
        }

        /* Icon colors */
        .ha { background: linear-gradient(135deg, #41bdf5, #2196f3); }
        .grafana { background: linear-gradient(135deg, #f2931e, #e55b3c); }
        .portainer { background: linear-gradient(135deg, #13bef9, #0db7ed); }
        .influxdb { background: linear-gradient(135deg, #22adf6, #9394ff); }
        .neviweb { background: linear-gradient(135deg, #4ade80, #22c55e); }
        .n8n { background: linear-gradient(135deg, #ff6d5a, #ea4b30); }
        .notify { background: linear-gradient(135deg, #ff6d5a, #ff8f4a); }
        .claude { background: linear-gradient(135deg, #d97706, #b45309); }
        .sudo-claude { background: linear-gradient(135deg, #dc2626, #991b1b); }
        .terminal { background: linear-gradient(135deg, #059669, #047857); }
        .mcp-manager { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .serial-numbers { background: linear-gradient(135deg, #0ea5e9, #0284c7); }
        .opermax-quote { background: linear-gradient(135deg, #f97316, #ea580c); }
        .trading-bot { background: linear-gradient(135deg, #10b981, #059669); }
        .guillevin { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1e293b;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 { margin-bottom: 20px; font-weight: 500; }
        .modal h3 { margin: 25px 0 15px; font-weight: 500; color: #94a3b8; font-size: 0.9rem; }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .app-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .app-toggle label { display: flex; align-items: center; gap: 10px; }
        .app-toggle select {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        .app-toggle select option {
            background: #1e293b;
            color: #fff;
            padding: 8px;
        }
        .app-toggle select option:hover,
        .app-toggle select option:checked {
            background: #3b82f6;
            color: #fff;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            font-size: 0.85rem;
        }
        .status {
            display: inline-block;
            width: 8px; height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .drag-over { border: 2px dashed #4ade80 !important; }

        /* Page navigation dots */
        .page-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin: 30px 0 10px;
        }
        .page-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .page-dot:hover { background: rgba(255,255,255,0.4); transform: scale(1.1); }
        .page-dot.active { background: #4ade80; transform: scale(1.3); }
        .page-dot .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .page-dot:hover .tooltip { opacity: 1; }

        /* Context menu */
        .context-menu {
            position: fixed;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 8px 0;
            min-width: 200px;
            display: none;
            z-index: 2000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .context-menu.active { display: block; }
        .context-title {
            padding: 8px 16px;
            color: #64748b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .context-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
            color: #fff !important;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .context-item:hover { background: rgba(255,255,255,0.1); color: #fff !important; }
        .context-item.current { color: #4ade80 !important; }
        .context-item.current::after { content: ' ✓'; margin-left: auto; }
        .context-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 8px 0; }
        .context-new { color: #4ade80 !important; }

        /* Page manager in admin */
        .page-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .page-item-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .page-item-name { font-weight: 500; }
        .page-item-count {
            font-size: 0.75rem;
            color: #64748b;
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .page-item-actions {
            display: flex;
            gap: 8px;
        }
        .page-item-actions button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #94a3b8;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .page-item-actions button:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .page-item-actions button.delete:hover { background: #ef4444; }
        .btn-add-page {
            width: 100%;
            padding: 12px;
            background: rgba(74, 222, 128, 0.2);
            border: 1px dashed #4ade80;
            border-radius: 10px;
            color: #4ade80;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        .btn-add-page:hover { background: rgba(74, 222, 128, 0.3); }

        .btn-reset {
            margin-top: 20px;
            padding: 10px 20px;
            background: #ef4444;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        .btn-reset:hover { background: #dc2626; }

        .empty-page {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        .empty-page p { margin-bottom: 15px; }

        /* Sync status indicator */
        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-left: 15px;
            padding: 4px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            font-size: 0.75rem;
        }
        .sync-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
        }
        .sync-dot.syncing {
            background: #fbbf24;
            animation: pulse 1s infinite;
        }
        .sync-dot.error {
            background: #ef4444;
        }
        .sync-dot.local {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>Cactus</span> Home Server</h1>
            <p>cactus.local</p>
        </header>

        <div class="top-bar">
            <button class="top-btn btn-admin" onclick="openAdmin()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                Admin
            </button>
        </div>

        <div class="grid" id="appGrid"></div>

        <div class="page-nav" id="pageNav"></div>

        <footer>
            <p>
                <span class="status"></span>Serveur Ubuntu 24.04 LTS - Clic droit pour déplacer une app
                <span class="sync-status" id="syncStatus">
                    <span class="sync-dot" id="syncDot"></span>
                    <span id="syncText">Chargement...</span>
                </span>
            </p>
        </footer>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="contextMenu">
        <div class="context-title">Déplacer vers...</div>
        <div id="contextPages"></div>
        <div class="context-divider"></div>
        <button class="context-item context-new" onclick="createPageFromContext()">+ Nouvelle page</button>
    </div>

    <!-- Admin Modal -->
    <div class="modal" id="adminModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeAdmin()">&times;</button>
            <h2>Administration</h2>

            <h3>Pages</h3>
            <div id="pageManager"></div>
            <button class="btn-add-page" onclick="addPage()">+ Ajouter une page</button>

            <h3>Applications</h3>
            <p style="color:#64748b;font-size:0.85rem;margin-bottom:15px;">Assignez chaque application à une page</p>
            <div id="appToggles"></div>

            <button class="btn-reset" onclick="resetAll()">Réinitialiser tout</button>
        </div>
    </div>

    <script>
        // ============ Configuration ============
        // Mapping des hostnames vers IPs (pour les machines qui ne résolvent pas bien les noms)
        const hostMapping = {
            'cactus.rad': '192.168.1.200',
            'cactus': '192.168.1.200',
            'cactus.local': '192.168.1.200'
        };
        const rawHost = window.location.hostname;
        const host = hostMapping[rawHost] || rawHost;
        const baseUrl = (port, path = '') => `http://${host}:${port}${path}`;
        const baseUrlHttps = (port, path = '') => `https://${host}:${port}${path}`;

        const defaultApps = [
            { id: 'ha', name: 'Home Assistant', desc: 'Domotique et automatisation', port: ':8123', url: baseUrl(8123), icon: 'ha' },
            { id: 'grafana', name: 'Grafana', desc: 'Dashboards et monitoring', port: ':3000', url: baseUrl(3000), icon: 'grafana' },
            { id: 'portainer', name: 'Portainer', desc: 'Gestion conteneurs Docker', port: ':9443', url: baseUrlHttps(9443), icon: 'portainer' },
            { id: 'influxdb', name: 'InfluxDB', desc: 'Base de données temporelles', port: ':8086', url: baseUrl(8086), icon: 'influxdb' },
            { id: 'neviweb', name: 'Thermostats Neviweb', desc: 'Dashboard températures', port: 'Grafana', url: baseUrl(3000, '/d/57457f87-ce81-4198-a405-ac2c14946376/thermostats-neviweb'), icon: 'neviweb' },
            { id: 'n8n', name: 'n8n', desc: 'Automatisation workflows', port: ':5678', url: baseUrl(5678), icon: 'n8n' },
            { id: 'notify', name: 'Claude Notify Config', desc: 'Configuration notifications push', port: ':5003', url: baseUrl(5003), icon: 'notify' },
            { id: 'terminal', name: 'Terminal', desc: 'Terminal Bash web', port: ':7680', url: baseUrl(7680), icon: 'terminal' },
            { id: 'claude', name: 'Claude Terminal', desc: 'Terminal web Claude Code', port: ':7681', url: baseUrl(7681), icon: 'claude' },
            { id: 'sudo-claude', name: 'Sudo Claude Terminal', desc: 'Terminal web sudo Claude', port: ':7682', url: baseUrl(7682), icon: 'sudo-claude' },
            { id: 'mcp-manager', name: 'MCP Manager', desc: 'Gestionnaire serveurs MCP', port: ':3456', url: baseUrl(3456), icon: 'mcp-manager' },
            { id: 'serial-numbers', name: 'Serial Numbers', desc: 'Base de données numéros de série', port: ':8000', url: baseUrl(8000), icon: 'serial-numbers' },
            { id: 'opermax-quote', name: 'Soumission Opermax', desc: 'Générateur de soumissions', port: ':5002', url: baseUrl(5002), icon: 'opermax-quote' },
            { id: 'trading-bot', name: 'Trading Bot', desc: 'Grid Trading Binance', port: ':8080', url: baseUrl(8080), icon: 'trading-bot' },
            { id: 'guillevin', name: 'Guillevin Prix', desc: 'Gestion des prix fournisseurs', port: ':5050', url: baseUrl(5050), icon: 'guillevin' }
        ];

        const defaultPages = [
            { id: 'main', name: 'Accueil', apps: ['ha', 'grafana', 'portainer', 'influxdb', 'neviweb', 'n8n', 'notify', 'mcp-manager', 'serial-numbers', 'opermax-quote', 'trading-bot', 'guillevin'] },
            { id: 'terminals', name: 'Terminaux', apps: ['terminal', 'claude', 'sudo-claude'] }
        ];

        const icons = {
            ha: '<path d="M12 2L2 12h3v8h6v-6h2v6h6v-8h3L12 2z"/>',
            grafana: '<path d="M3 13h4v8H3v-8zm6-5h4v13H9V8zm6-5h4v18h-4V3z"/>',
            portainer: '<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>',
            influxdb: '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>',
            neviweb: '<path d="M15 13V5a3 3 0 0 0-6 0v8a5 5 0 1 0 6 0zm-3-9a1 1 0 0 1 1 1v3h-2V5a1 1 0 0 1 1-1z"/>',
            n8n: '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>',
            notify: '<path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/><circle cx="18" cy="8" r="4" fill="#ff6d5a"/><text x="18" y="10" text-anchor="middle" fill="white" font-size="6" font-weight="bold">!</text>',
            terminal: '<path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10z"/><path d="M7 9l4 3-4 3v-6z"/><path d="M13 15h5v-2h-5v2z"/>',
            claude: '<path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10z"/><path d="M7 9l4 3-4 3v-6z"/><circle cx="14" cy="10" r="1"/><circle cx="17" cy="10" r="1"/><circle cx="14" cy="14" r="1"/><circle cx="17" cy="14" r="1"/>',
            'sudo-claude': '<path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10z"/><path d="M7 9l4 3-4 3v-6z"/><path d="M14.5 10h3v1h-3z"/><path d="M14.5 12.5h3v1h-3z"/><circle cx="21" cy="5" r="4" fill="#ef4444"/><path d="M21 3v3M21 7.5v.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>',
            'mcp-manager': '<path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/><circle cx="8" cy="7" r="2"/><circle cx="14" cy="12" r="2"/><circle cx="10" cy="17" r="2"/>',
            'serial-numbers': '<path d="M3 5h2v14H3V5zm4 0h1v14H7V5zm3 0h2v14h-2V5zm4 0h3v14h-3V5zm5 0h2v14h-2V5z"/>',
            'opermax-quote': '<path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zm-2 6v-2h2v2h-2zm0-4v-2h2v2h-2zm-4 4v-2h2v2H7zm0-4v-2h2v2H7z"/>',
            'trading-bot': '<path d="M3.5 18.5l6-6 4 4L22 6.5"/><path d="M22 6.5h-5v5"/><path d="M3 3v18h18"/>',
            'guillevin': '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.1 1.05.82 1.87 2.65 1.87 1.96 0 2.4-.98 2.4-1.59 0-.83-.44-1.61-2.67-2.14-2.48-.6-4.18-1.62-4.18-3.67 0-1.72 1.39-2.84 3.11-3.21V4h2.67v1.95c1.86.45 2.79 1.86 2.85 3.39H14.3c-.05-1.11-.64-1.87-2.22-1.87-1.5 0-2.4.68-2.4 1.64 0 .84.65 1.39 2.67 1.91s4.18 1.39 4.18 3.91c-.01 1.83-1.38 2.83-3.12 3.16z"/>'
        };

        // ============ State ============
        let currentPageId = 'main';
        let contextAppId = null;
        let cachedPages = null;
        let apiEnabled = false;
        let syncDebounceTimer = null;

        // ============ API Functions ============
        const API_BASE = '/api';

        function updateSyncStatus(status, text) {
            const dot = document.getElementById('syncDot');
            const textEl = document.getElementById('syncText');
            if (dot && textEl) {
                dot.className = 'sync-dot ' + status;
                textEl.textContent = text;
            }
        }

        async function loadPreferencesFromAPI() {
            try {
                const response = await fetch(`${API_BASE}/preferences`);
                if (response.ok) {
                    const data = await response.json();
                    apiEnabled = true;
                    cachedPages = data.pages || JSON.parse(JSON.stringify(defaultPages));
                    currentPageId = data.currentPage || 'main';
                    // Also save to localStorage as backup
                    localStorage.setItem('cactusPages', JSON.stringify(cachedPages));
                    localStorage.setItem('cactusCurrentPage', currentPageId);
                    updateSyncStatus('', 'Sync serveur');
                    return true;
                }
            } catch (e) {
                console.log('API non disponible, utilisation du localStorage');
            }
            apiEnabled = false;
            updateSyncStatus('local', 'Local uniquement');
            return false;
        }

        async function savePagesToAPI(pages) {
            if (!apiEnabled) return;

            updateSyncStatus('syncing', 'Synchronisation...');
            try {
                const response = await fetch(`${API_BASE}/preferences/pages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pages)
                });
                if (response.ok) {
                    updateSyncStatus('', 'Sync serveur');
                    return true;
                }
            } catch (e) {
                console.error('Erreur sauvegarde API:', e);
            }
            updateSyncStatus('error', 'Erreur sync');
            return false;
        }

        async function saveCurrentPageToAPI(pageId) {
            if (!apiEnabled) return;

            try {
                await fetch(`${API_BASE}/preferences/current-page`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currentPage: pageId })
                });
            } catch (e) {
                console.error('Erreur sauvegarde page courante:', e);
            }
        }

        // ============ Pages Management ============
        function getPages() {
            if (cachedPages) {
                return cachedPages;
            }
            const saved = localStorage.getItem('cactusPages');
            if (saved) {
                cachedPages = JSON.parse(saved);
                return cachedPages;
            }
            // Check for old format and migrate
            if (localStorage.getItem('cactusApps') || localStorage.getItem('cactusOrder')) {
                cachedPages = migrateOldFormat();
                return cachedPages;
            }
            cachedPages = JSON.parse(JSON.stringify(defaultPages));
            return cachedPages;
        }

        function savePages(pages) {
            cachedPages = pages;
            localStorage.setItem('cactusPages', JSON.stringify(pages));

            // Debounce API calls to avoid too many requests
            if (syncDebounceTimer) clearTimeout(syncDebounceTimer);
            syncDebounceTimer = setTimeout(() => {
                savePagesToAPI(pages);
            }, 500);
        }

        function getCurrentPageId() {
            const saved = localStorage.getItem('cactusCurrentPage');
            const pages = getPages();
            if (saved && pages.find(p => p.id === saved)) {
                return saved;
            }
            return pages.length > 0 ? pages[0].id : 'main';
        }

        function setCurrentPageId(pageId) {
            currentPageId = pageId;
            localStorage.setItem('cactusCurrentPage', pageId);
            saveCurrentPageToAPI(pageId);
            renderApps();
            renderPageDots();
        }

        function migrateOldFormat() {
            const oldApps = localStorage.getItem('cactusApps');
            const oldOrder = localStorage.getItem('cactusOrder');

            let visibleApps = defaultApps.filter(a => a.visible !== false).map(a => a.id);
            let hiddenApps = defaultApps.filter(a => a.visible === false).map(a => a.id);

            if (oldApps) {
                const parsed = JSON.parse(oldApps);
                visibleApps = parsed.filter(a => a.visible).map(a => a.id);
                hiddenApps = parsed.filter(a => !a.visible).map(a => a.id);
            }

            if (oldOrder) {
                const order = JSON.parse(oldOrder);
                visibleApps = order.filter(id => visibleApps.includes(id));
            }

            const pages = [
                { id: 'main', name: 'Accueil', apps: visibleApps },
                { id: 'autres', name: 'Autres', apps: hiddenApps }
            ];

            // Clean up old format
            localStorage.removeItem('cactusApps');
            localStorage.removeItem('cactusOrder');

            savePages(pages);
            return pages;
        }

        function addPage(name = null) {
            if (!name) {
                name = prompt('Nom de la nouvelle page:');
                if (!name) return;
            }
            const pages = getPages();
            const id = 'page_' + Date.now();
            pages.push({ id, name, apps: [] });
            savePages(pages);
            renderPageManager();
            renderPageDots();
            renderAppToggles();
        }

        function renamePage(pageId) {
            const pages = getPages();
            const page = pages.find(p => p.id === pageId);
            if (!page) return;

            const newName = prompt('Nouveau nom:', page.name);
            if (!newName) return;

            page.name = newName;
            savePages(pages);
            renderPageManager();
            renderPageDots();
        }

        function deletePage(pageId) {
            const pages = getPages();
            if (pages.length <= 1) {
                alert('Vous devez garder au moins une page.');
                return;
            }

            const page = pages.find(p => p.id === pageId);
            if (!page) return;

            if (!confirm(`Supprimer la page "${page.name}" ? Les apps seront déplacées vers la première page.`)) return;

            // Move apps to first page
            const firstPage = pages.find(p => p.id !== pageId);
            if (firstPage && page.apps.length > 0) {
                firstPage.apps.push(...page.apps);
            }

            const newPages = pages.filter(p => p.id !== pageId);
            savePages(newPages);

            if (currentPageId === pageId) {
                setCurrentPageId(newPages[0].id);
            }

            renderPageManager();
            renderPageDots();
            renderAppToggles();
        }

        // ============ App Management ============
        function getAppById(appId) {
            return defaultApps.find(a => a.id === appId);
        }

        function moveAppToPage(appId, targetPageId) {
            const pages = getPages();

            // Remove from current page
            pages.forEach(page => {
                page.apps = page.apps.filter(id => id !== appId);
            });

            // Add to target page
            const targetPage = pages.find(p => p.id === targetPageId);
            if (targetPage) {
                targetPage.apps.push(appId);
            }

            savePages(pages);
            renderApps();
            renderAppToggles();
            hideContextMenu();
        }

        function getAppPage(appId) {
            const pages = getPages();
            for (const page of pages) {
                if (page.apps.includes(appId)) {
                    return page;
                }
            }
            return null;
        }

        // ============ Rendering ============
        function createCard(app) {
            return `
                <a href="${app.url}" class="card" draggable="true" data-id="${app.id}" target="_blank" oncontextmenu="showContextMenu(event, '${app.id}'); return false;">
                    <div class="card-icon ${app.icon}">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="white">${icons[app.icon]}</svg>
                    </div>
                    <h2>${app.name}</h2>
                    <p>${app.desc}</p>
                    <span class="port">${app.port}</span>
                </a>
            `;
        }

        function renderApps() {
            const pages = getPages();
            const currentPage = pages.find(p => p.id === currentPageId);
            const grid = document.getElementById('appGrid');

            if (!currentPage || currentPage.apps.length === 0) {
                grid.innerHTML = `
                    <div class="empty-page" style="grid-column: 1 / -1;">
                        <p>Cette page est vide</p>
                        <p style="font-size:0.85rem;">Utilisez le clic droit sur une app pour la déplacer ici</p>
                    </div>
                `;
                return;
            }

            const apps = currentPage.apps
                .map(id => getAppById(id))
                .filter(a => a);

            grid.innerHTML = apps.map(createCard).join('');
            setupDragAndDrop();
        }

        function renderPageDots() {
            const pages = getPages();
            const nav = document.getElementById('pageNav');

            if (pages.length <= 1) {
                nav.innerHTML = '';
                return;
            }

            nav.innerHTML = pages.map(page => `
                <div class="page-dot ${page.id === currentPageId ? 'active' : ''}"
                     onclick="setCurrentPageId('${page.id}')"
                     title="${page.name}">
                    <span class="tooltip">${page.name}</span>
                </div>
            `).join('');
        }

        function renderPageManager() {
            const pages = getPages();
            const container = document.getElementById('pageManager');

            container.innerHTML = pages.map(page => `
                <div class="page-item">
                    <div class="page-item-info">
                        <span class="page-item-name">${page.name}</span>
                        <span class="page-item-count">${page.apps.length} apps</span>
                    </div>
                    <div class="page-item-actions">
                        <button onclick="renamePage('${page.id}')">Renommer</button>
                        <button class="delete" onclick="deletePage('${page.id}')">Supprimer</button>
                    </div>
                </div>
            `).join('');
        }

        function renderAppToggles() {
            const pages = getPages();
            const container = document.getElementById('appToggles');

            container.innerHTML = defaultApps.map(app => {
                const currentPage = getAppPage(app.id);
                const currentPageId = currentPage ? currentPage.id : '';

                return `
                    <div class="app-toggle">
                        <label>
                            <div class="card-icon ${app.icon}" style="width:36px;height:36px;border-radius:8px;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">${icons[app.icon]}</svg>
                            </div>
                            ${app.name}
                        </label>
                        <select onchange="moveAppToPage('${app.id}', this.value)">
                            <option value="">-- Non assignée --</option>
                            ${pages.map(p => `
                                <option value="${p.id}" ${p.id === currentPageId ? 'selected' : ''}>${p.name}</option>
                            `).join('')}
                        </select>
                    </div>
                `;
            }).join('');
        }

        // ============ Context Menu ============
        function showContextMenu(e, appId) {
            e.preventDefault();
            contextAppId = appId;

            const pages = getPages();
            const currentAppPage = getAppPage(appId);
            const menu = document.getElementById('contextMenu');
            const pagesContainer = document.getElementById('contextPages');

            pagesContainer.innerHTML = pages.map(page => `
                <button class="context-item ${currentAppPage && currentAppPage.id === page.id ? 'current' : ''}"
                        onclick="moveAppToPage('${appId}', '${page.id}')">
                    ${page.name}
                </button>
            `).join('');

            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
            menu.classList.add('active');
        }

        function hideContextMenu() {
            document.getElementById('contextMenu').classList.remove('active');
            contextAppId = null;
        }

        function createPageFromContext() {
            const name = prompt('Nom de la nouvelle page:');
            if (!name) return;

            const pages = getPages();
            const id = 'page_' + Date.now();
            pages.push({ id, name, apps: [] });
            savePages(pages);

            if (contextAppId) {
                moveAppToPage(contextAppId, id);
            }

            renderPageDots();
            renderPageManager();
            renderAppToggles();
            hideContextMenu();
        }

        // ============ Admin Modal ============
        function openAdmin() {
            renderPageManager();
            renderAppToggles();
            document.getElementById('adminModal').classList.add('active');
        }

        function closeAdmin() {
            document.getElementById('adminModal').classList.remove('active');
            renderApps();
            renderPageDots();
        }

        async function resetAll() {
            if (!confirm('Réinitialiser toutes les pages et positions ?')) return;
            localStorage.removeItem('cactusPages');
            localStorage.removeItem('cactusCurrentPage');
            cachedPages = JSON.parse(JSON.stringify(defaultPages));
            currentPageId = 'main';

            // Reset on server too
            if (apiEnabled) {
                try {
                    await fetch(`${API_BASE}/preferences`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pages: cachedPages, currentPage: 'main' })
                    });
                } catch (e) {
                    console.error('Erreur reset API:', e);
                }
            }

            renderApps();
            renderPageDots();
            renderPageManager();
            renderAppToggles();
        }

        // ============ Drag and Drop ============
        let draggedEl = null;

        function setupDragAndDrop() {
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                card.addEventListener('dragstart', (e) => {
                    draggedEl = card;
                    setTimeout(() => card.classList.add('dragging'), 0);
                });

                card.addEventListener('dragend', () => {
                    card.classList.remove('dragging');
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
                    saveCurrentOrder();
                });

                card.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (card !== draggedEl) {
                        card.classList.add('drag-over');
                    }
                });

                card.addEventListener('dragleave', () => {
                    card.classList.remove('drag-over');
                });

                card.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (card !== draggedEl) {
                        const grid = document.getElementById('appGrid');
                        const allCards = [...grid.querySelectorAll('.card')];
                        const draggedIdx = allCards.indexOf(draggedEl);
                        const dropIdx = allCards.indexOf(card);

                        if (draggedIdx < dropIdx) {
                            card.after(draggedEl);
                        } else {
                            card.before(draggedEl);
                        }
                    }
                    card.classList.remove('drag-over');
                });
            });
        }

        function saveCurrentOrder() {
            const cards = document.querySelectorAll('#appGrid .card');
            const newOrder = [...cards].map(c => c.dataset.id);

            const pages = getPages();
            const currentPage = pages.find(p => p.id === currentPageId);
            if (currentPage) {
                currentPage.apps = newOrder;
                savePages(pages);
            }
        }

        // ============ Event Listeners ============
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.context-menu')) {
                hideContextMenu();
            }
        });

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // ============ Init ============
        async function init() {
            // Try to load from API first
            await loadPreferencesFromAPI();

            // If API didn't provide pages, get from localStorage
            if (!cachedPages) {
                cachedPages = getPages();
                currentPageId = getCurrentPageId();
            }

            // Validate currentPageId
            const pages = getPages();
            if (!pages.find(p => p.id === currentPageId)) {
                currentPageId = pages.length > 0 ? pages[0].id : 'main';
            }

            renderApps();
            renderPageDots();
        }

        init();
    </script>
</body>
</html>
