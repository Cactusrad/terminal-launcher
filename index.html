<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cactus Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 2.5rem; font-weight: 300; margin-bottom: 8px; }
        header h1 span { color: #4ade80; }
        header p { color: #94a3b8; font-size: 1rem; }

        .top-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .top-btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-admin {
            background: rgba(255,255,255,0.1);
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .top-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: grab;
            user-select: none;
        }
        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .card.dragging { opacity: 0.5; cursor: grabbing; }
        .card-icon {
            width: 60px; height: 60px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        .card h2 { font-size: 1.2rem; font-weight: 500; margin-bottom: 6px; }
        .card p { color: #94a3b8; font-size: 0.85rem; margin-bottom: 12px; }
        .card .port {
            font-size: 0.75rem;
            color: #64748b;
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 15px;
        }

        /* Icon colors */
        .ha { background: linear-gradient(135deg, #41bdf5, #2196f3); }
        .grafana { background: linear-gradient(135deg, #f2931e, #e55b3c); }
        .portainer { background: linear-gradient(135deg, #13bef9, #0db7ed); }
        .influxdb { background: linear-gradient(135deg, #22adf6, #9394ff); }
        .neviweb { background: linear-gradient(135deg, #4ade80, #22c55e); }
        .n8n { background: linear-gradient(135deg, #ff6d5a, #ea4b30); }
        .notify { background: linear-gradient(135deg, #ff6d5a, #ff8f4a); }
        .claude { background: linear-gradient(135deg, #d97706, #b45309); }
        .sudo-claude { background: linear-gradient(135deg, #dc2626, #991b1b); }
        .terminal { background: linear-gradient(135deg, #059669, #047857); }
        .mcp-manager { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .serial-numbers { background: linear-gradient(135deg, #0ea5e9, #0284c7); }
        .opermax-quote { background: linear-gradient(135deg, #f97316, #ea580c); }
        .trading-bot { background: linear-gradient(135deg, #10b981, #059669); }
        .guillevin { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1e293b;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 { margin-bottom: 20px; font-weight: 500; }
        .modal h3 { margin: 25px 0 15px; font-weight: 500; color: #94a3b8; font-size: 0.9rem; }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .app-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .app-toggle label { display: flex; align-items: center; gap: 10px; }
        .app-toggle select {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        .app-toggle select option {
            background: #1e293b;
            color: #fff;
            padding: 8px;
        }
        .app-toggle select option:hover,
        .app-toggle select option:checked {
            background: #3b82f6;
            color: #fff;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            font-size: 0.85rem;
        }
        .status {
            display: inline-block;
            width: 8px; height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .drag-over { border: 2px dashed #4ade80 !important; }

        /* Page navigation dots */
        .page-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin: 30px 0 10px;
        }
        .page-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .page-dot:hover { background: rgba(255,255,255,0.4); transform: scale(1.1); }
        .page-dot.active { background: #4ade80; transform: scale(1.3); }
        .page-dot .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .page-dot:hover .tooltip { opacity: 1; }

        /* Context menu */
        .context-menu {
            position: fixed;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 8px 0;
            min-width: 200px;
            display: none;
            z-index: 2000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .context-menu.active { display: block; }
        .context-title {
            padding: 8px 16px;
            color: #64748b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .context-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
            color: #fff !important;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .context-item:hover { background: rgba(255,255,255,0.1); color: #fff !important; }
        .context-item.current { color: #4ade80 !important; }
        .context-item.current::after { content: ' ✓'; margin-left: auto; }
        .context-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 8px 0; }
        .context-new { color: #4ade80 !important; }

        /* Page manager in admin */
        .page-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .page-item-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .page-item-name { font-weight: 500; }
        .page-item-count {
            font-size: 0.75rem;
            color: #64748b;
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .page-item-actions {
            display: flex;
            gap: 8px;
        }
        .page-item-actions button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #94a3b8;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .page-item-actions button:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .page-item-actions button.delete:hover { background: #ef4444; }
        .btn-add-page {
            width: 100%;
            padding: 12px;
            background: rgba(74, 222, 128, 0.2);
            border: 1px dashed #4ade80;
            border-radius: 10px;
            color: #4ade80;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        .btn-add-page:hover { background: rgba(74, 222, 128, 0.3); }

        .btn-reset {
            margin-top: 20px;
            padding: 10px 20px;
            background: #ef4444;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        .btn-reset:hover { background: #dc2626; }

        .empty-page {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        .empty-page p { margin-bottom: 15px; }

        /* Sync status indicator */
        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-left: 15px;
            padding: 4px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            font-size: 0.75rem;
        }
        .sync-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
        }
        .sync-dot.syncing {
            background: #fbbf24;
            animation: pulse 1s infinite;
        }
        .sync-dot.error {
            background: #ef4444;
        }
        .sync-dot.local {
            background: #94a3b8;
        }

        /* Project View */
        .project-view {
            display: none;
            height: calc(100vh - 160px);
            gap: 20px;
        }
        .project-view.active {
            display: grid;
            grid-template-columns: 1fr 350px;
            grid-template-rows: 1fr 1fr;
        }
        .project-main {
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .project-terminal {
            flex: 1;
            background: #0d1117;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .project-terminal iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .project-instructions {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        .project-instructions h3 {
            color: #4ade80;
            margin-bottom: 10px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .project-instructions pre {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.75rem;
            color: #94a3b8;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .project-instructions table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        .project-instructions th,
        .project-instructions td {
            padding: 6px 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .project-instructions th {
            color: #64748b;
            font-weight: 500;
        }
        .project-instructions code {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        /* Agent Tasks Viewer */
        .agent-tasks {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
        }
        .agent-tasks h3 {
            color: #8b5cf6;
            margin-bottom: 12px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .agent-task-item {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-left: 3px solid #64748b;
        }
        .agent-task-item.running {
            border-left-color: #fbbf24;
            background: rgba(251,191,36,0.1);
        }
        .agent-task-item.completed {
            border-left-color: #4ade80;
        }
        .agent-task-item.pending {
            border-left-color: #64748b;
        }
        .agent-task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .agent-name {
            font-weight: 600;
            font-size: 0.8rem;
            color: #fff;
        }
        .agent-status {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }
        .agent-status.running {
            background: rgba(251,191,36,0.3);
            color: #fbbf24;
        }
        .agent-status.completed {
            background: rgba(74,222,128,0.3);
            color: #4ade80;
        }
        .agent-task-desc {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        /* Issues Manager */
        .issues-manager {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
        }
        .issues-manager h3 {
            color: #ef4444;
            margin-bottom: 12px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .btn-add-issue {
            background: rgba(239,68,68,0.2);
            border: none;
            color: #ef4444;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .btn-add-issue:hover {
            background: rgba(239,68,68,0.3);
        }
        .issue-item {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-left: 3px solid #ef4444;
            cursor: pointer;
            transition: all 0.2s;
        }
        .issue-item:hover {
            background: rgba(255,255,255,0.06);
        }
        .issue-item.medium {
            border-left-color: #fbbf24;
        }
        .issue-item.low {
            border-left-color: #4ade80;
        }
        .issue-item.resolved {
            opacity: 0.5;
            border-left-color: #64748b;
        }
        .issue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .issue-title {
            font-weight: 500;
            font-size: 0.8rem;
            color: #fff;
        }
        .issue-priority {
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 8px;
            text-transform: uppercase;
        }
        .issue-priority.high {
            background: rgba(239,68,68,0.3);
            color: #ef4444;
        }
        .issue-priority.medium {
            background: rgba(251,191,36,0.3);
            color: #fbbf24;
        }
        .issue-priority.low {
            background: rgba(74,222,128,0.3);
            color: #4ade80;
        }
        .issue-desc {
            font-size: 0.7rem;
            color: #64748b;
            margin-bottom: 6px;
        }
        .issue-actions {
            display: flex;
            gap: 6px;
        }
        .issue-actions button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #94a3b8;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            cursor: pointer;
        }
        .issue-actions button:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        .issue-actions button.resolve {
            color: #4ade80;
        }
        .issue-actions button.delete {
            color: #ef4444;
        }
        .empty-issues {
            text-align: center;
            color: #64748b;
            padding: 20px;
            font-size: 0.8rem;
        }

        /* Issue Modal */
        .issue-modal-content {
            max-width: 500px;
        }
        .issue-modal-content input,
        .issue-modal-content textarea,
        .issue-modal-content select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            margin-bottom: 15px;
            font-family: inherit;
        }
        .issue-modal-content textarea {
            min-height: 100px;
            resize: vertical;
        }
        .issue-modal-content label {
            display: block;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }
        .issue-modal-content .btn-submit {
            background: #4ade80;
            border: none;
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .issue-modal-content .btn-submit:hover {
            background: #22c55e;
        }

        /* Tmux Controls */
        .tmux-controls {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
        }
        .tmux-controls h3 {
            color: #10b981;
            margin-bottom: 10px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tmux-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tmux-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 8px 12px;
            color: #e2e8f0;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: calc(50% - 3px);
            justify-content: flex-start;
        }
        .tmux-btn:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            transform: translateY(-1px);
        }
        .tmux-btn.active {
            background: rgba(16, 185, 129, 0.3);
            border-color: #10b981;
            color: #10b981;
        }
        .tmux-key {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .tmux-status {
            margin-top: 8px;
            font-size: 0.7rem;
            color: #64748b;
            text-align: center;
            min-height: 16px;
        }
        .tmux-status.success { color: #10b981; }
        .tmux-status.error { color: #ef4444; }

        /* Project card style */
        .project-card { background: linear-gradient(135deg, #6366f1, #8b5cf6); }

        /* Back button */
        .btn-back {
            background: rgba(255,255,255,0.1);
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }
        .btn-back:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>Cactus</span> Home Server</h1>
            <p>cactus.local</p>
        </header>

        <div class="top-bar">
            <button class="top-btn btn-admin" onclick="openAdmin()">

        // ============ State ============
        let currentPageId = 'main';
        let contextAppId = null;
        let cachedPages = null;
        let apiEnabled = false;
        let syncDebounceTimer = null;
        let currentProjectId = null;
        let projectIssues = {};
        let agentTasks = {};

        // ============ API Functions ============
        const API_BASE = '/api';

        function updateSyncStatus(status, text) {
            const dot = document.getElementById('syncDot');
            const textEl = document.getElementById('syncText');
            if (dot && textEl) {
                dot.className = 'sync-dot ' + status;
                textEl.textContent = text;
            }
        }

        async function loadPreferencesFromAPI() {
            try {
                const response = await fetch(`${API_BASE}/preferences`);
                if (response.ok) {
                    const data = await response.json();
                    apiEnabled = true;
                    cachedPages = data.pages || JSON.parse(JSON.stringify(defaultPages));
                    currentPageId = data.currentPage || 'main';
                    // Also save to localStorage as backup
                    localStorage.setItem('cactusPages', JSON.stringify(cachedPages));
                    localStorage.setItem('cactusCurrentPage', currentPageId);
                    updateSyncStatus('', 'Sync serveur');
                    return true;
                }
            } catch (e) {
                console.log('API non disponible, utilisation du localStorage');
            }
            apiEnabled = false;
            updateSyncStatus('local', 'Local uniquement');
            return false;
        }

        async function savePagesToAPI(pages) {
            if (!apiEnabled) return;

            updateSyncStatus('syncing', 'Synchronisation...');
            try {
                const response = await fetch(`${API_BASE}/preferences/pages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pages)
                });
                if (response.ok) {
                    updateSyncStatus('', 'Sync serveur');
                    return true;
                }
            } catch (e) {
                console.error('Erreur sauvegarde API:', e);
            }
            updateSyncStatus('error', 'Erreur sync');
            return false;
        }

        async function saveCurrentPageToAPI(pageId) {
            if (!apiEnabled) return;

            try {
                await fetch(`${API_BASE}/preferences/current-page`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currentPage: pageId })
                });
            } catch (e) {
                console.error('Erreur sauvegarde page courante:', e);
            }
        }

        // ============ Pages Management ============
        function getPages() {
            if (cachedPages) {
                return cachedPages;
            }
            const saved = localStorage.getItem('cactusPages');
            if (saved) {
                cachedPages = JSON.parse(saved);
                return cachedPages;
            }
            // Check for old format and migrate
            if (localStorage.getItem('cactusApps') || localStorage.getItem('cactusOrder')) {
                cachedPages = migrateOldFormat();
                return cachedPages;
            }
            cachedPages = JSON.parse(JSON.stringify(defaultPages));
            return cachedPages;
        }

        function savePages(pages) {
            cachedPages = pages;
            localStorage.setItem('cactusPages', JSON.stringify(pages));

            // Debounce API calls to avoid too many requests
            if (syncDebounceTimer) clearTimeout(syncDebounceTimer);
            syncDebounceTimer = setTimeout(() => {
                savePagesToAPI(pages);
            }, 500);
        }

        function getCurrentPageId() {
            const saved = localStorage.getItem('cactusCurrentPage');
            const pages = getPages();
            if (saved && pages.find(p => p.id === saved)) {
                return saved;
            }
            return pages.length > 0 ? pages[0].id : 'main';
        }

        function setCurrentPageId(pageId) {
            currentPageId = pageId;
            localStorage.setItem('cactusCurrentPage', pageId);
            saveCurrentPageToAPI(pageId);
            renderApps();
            renderPageDots();
        }

        function migrateOldFormat() {
            const oldApps = localStorage.getItem('cactusApps');
            const oldOrder = localStorage.getItem('cactusOrder');

            let visibleApps = defaultApps.filter(a => a.visible !== false).map(a => a.id);
            let hiddenApps = defaultApps.filter(a => a.visible === false).map(a => a.id);

            if (oldApps) {
                const parsed = JSON.parse(oldApps);
                visibleApps = parsed.filter(a => a.visible).map(a => a.id);
                hiddenApps = parsed.filter(a => !a.visible).map(a => a.id);
            }

            if (oldOrder) {
                const order = JSON.parse(oldOrder);
                visibleApps = order.filter(id => visibleApps.includes(id));
            }

            const pages = [
                { id: 'main', name: 'Accueil', apps: visibleApps },
                { id: 'autres', name: 'Autres', apps: hiddenApps }
            ];

            // Clean up old format
            localStorage.removeItem('cactusApps');
            localStorage.removeItem('cactusOrder');

            savePages(pages);
            return pages;
        }

        function addPage(name = null) {
            if (!name) {
                name = prompt('Nom de la nouvelle page:');
                if (!name) return;
            }
            const pages = getPages();
            const id = 'page_' + Date.now();
            pages.push({ id, name, apps: [] });
            savePages(pages);
            renderPageManager();
            renderPageDots();
            renderAppToggles();
        }

        function renamePage(pageId) {
            const pages = getPages();
            const page = pages.find(p => p.id === pageId);
            if (!page) return;

            const newName = prompt('Nouveau nom:', page.name);
            if (!newName) return;

            page.name = newName;
            savePages(pages);
            renderPageManager();
            renderPageDots();
        }

        function deletePage(pageId) {
            const pages = getPages();
            if (pages.length <= 1) {
                alert('Vous devez garder au moins une page.');
                return;
            }

            const page = pages.find(p => p.id === pageId);
            if (!page) return;

            if (!confirm(`Supprimer la page "${page.name}" ? Les apps seront déplacées vers la première page.`)) return;

            // Move apps to first page
            const firstPage = pages.find(p => p.id !== pageId);
            if (firstPage && page.apps.length > 0) {
                firstPage.apps.push(...page.apps);
            }

            const newPages = pages.filter(p => p.id !== pageId);
            savePages(newPages);

            if (currentPageId === pageId) {
                setCurrentPageId(newPages[0].id);
            }

            renderPageManager();
            renderPageDots();
            renderAppToggles();
        }

        // ============ App Management ============
        function getAppById(appId) {
            return defaultApps.find(a => a.id === appId);
        }

        function moveAppToPage(appId, targetPageId) {
            const pages = getPages();

            // Remove from current page
            pages.forEach(page => {
                page.apps = page.apps.filter(id => id !== appId);
            });

            // Add to target page
            const targetPage = pages.find(p => p.id === targetPageId);
            if (targetPage) {
                targetPage.apps.push(appId);
            }

            savePages(pages);
            renderApps();
            renderAppToggles();
            hideContextMenu();
        }

        function getAppPage(appId) {
            const pages = getPages();
            for (const page of pages) {
                if (page.apps.includes(appId)) {
                    return page;
                }
            }
            return null;
        }

        // ============ Rendering ============
        function createCard(app) {
            if (app.isProject) {
                // Project card - opens project view instead of external URL
                const projectId = app.url.replace('#project:', '');
                return `
                    <div class="card" draggable="true" data-id="${app.id}" onclick="openProjectView('${projectId}')" oncontextmenu="showContextMenu(event, '${app.id}'); return false;" style="cursor: pointer;">
                        <div class="card-icon ${app.icon}">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="white">${icons[app.icon]}</svg>
                        </div>
                        <h2>${app.name}</h2>
                        <p>${app.desc}</p>
                        <span class="port">${app.port}</span>
                    </div>
                `;
            }
            return `
                <a href="${app.url}" class="card" draggable="true" data-id="${app.id}" target="_blank" oncontextmenu="showContextMenu(event, '${app.id}'); return false;">
                    <div class="card-icon ${app.icon}">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="white">${icons[app.icon]}</svg>
                    </div>
                    <h2>${app.name}</h2>
                    <p>${app.desc}</p>
                    <span class="port">${app.port}</span>
                </a>
            `;
        }

        function renderApps() {
            const pages = getPages();
            const currentPage = pages.find(p => p.id === currentPageId);
            const grid = document.getElementById('appGrid');

            if (!currentPage || currentPage.apps.length === 0) {
                grid.innerHTML = `
                    <div class="empty-page" style="grid-column: 1 / -1;">
                        <p>Cette page est vide</p>
                        <p style="font-size:0.85rem;">Utilisez le clic droit sur une app pour la déplacer ici</p>
                    </div>
                `;
                return;
            }

            const apps = currentPage.apps
                .map(id => getAppById(id))
                .filter(a => a);

            grid.innerHTML = apps.map(createCard).join('');
            setupDragAndDrop();
        }

        function renderPageDots() {
            const pages = getPages();
            const nav = document.getElementById('pageNav');

            if (pages.length <= 1) {
                nav.innerHTML = '';
                return;
            }

            nav.innerHTML = pages.map(page => `
                <div class="page-dot ${page.id === currentPageId ? 'active' : ''}"
                     onclick="setCurrentPageId('${page.id}')"
                     title="${page.name}">
                    <span class="tooltip">${page.name}</span>
                </div>
            `).join('');
        }

        function renderPageManager() {
            const pages = getPages();
            const container = document.getElementById('pageManager');

            container.innerHTML = pages.map(page => `
                <div class="page-item">
                    <div class="page-item-info">
                        <span class="page-item-name">${page.name}</span>
                        <span class="page-item-count">${page.apps.length} apps</span>
                    </div>
                    <div class="page-item-actions">
                        <button onclick="renamePage('${page.id}')">Renommer</button>
                        <button class="delete" onclick="deletePage('${page.id}')">Supprimer</button>
                    </div>
                </div>
            `).join('');
        }

        function renderAppToggles() {
            const pages = getPages();
            const container = document.getElementById('appToggles');

            container.innerHTML = defaultApps.map(app => {
                const currentPage = getAppPage(app.id);
                const currentPageId = currentPage ? currentPage.id : '';

                return `
                    <div class="app-toggle">
                        <label>
                            <div class="card-icon ${app.icon}" style="width:36px;height:36px;border-radius:8px;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">${icons[app.icon]}</svg>
                            </div>
                            ${app.name}
                        </label>
                        <select onchange="moveAppToPage('${app.id}', this.value)">
                            <option value="">-- Non assignée --</option>
                            ${pages.map(p => `
                                <option value="${p.id}" ${p.id === currentPageId ? 'selected' : ''}>${p.name}</option>
                            `).join('')}
                        </select>
                    </div>
                `;
            }).join('');
        }

        // ============ Context Menu ============
        function showContextMenu(e, appId) {
            e.preventDefault();
            contextAppId = appId;

            const pages = getPages();
            const currentAppPage = getAppPage(appId);
            const menu = document.getElementById('contextMenu');
            const pagesContainer = document.getElementById('contextPages');

            pagesContainer.innerHTML = pages.map(page => `
                <button class="context-item ${currentAppPage && currentAppPage.id === page.id ? 'current' : ''}"
                        onclick="moveAppToPage('${appId}', '${page.id}')">
                    ${page.name}
                </button>
            `).join('');

            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
            menu.classList.add('active');
        }

        function hideContextMenu() {
            document.getElementById('contextMenu').classList.remove('active');
            contextAppId = null;
        }

        function createPageFromContext() {
            const name = prompt('Nom de la nouvelle page:');
            if (!name) return;

            const pages = getPages();
            const id = 'page_' + Date.now();
            pages.push({ id, name, apps: [] });
            savePages(pages);

            if (contextAppId) {
                moveAppToPage(contextAppId, id);
            }

            renderPageDots();
            renderPageManager();
            renderAppToggles();
            hideContextMenu();
        }

        // ============ Admin Modal ============
        function openAdmin() {
            renderPageManager();
            renderAppToggles();
            document.getElementById('adminModal').classList.add('active');
        }

        function closeAdmin() {
            document.getElementById('adminModal').classList.remove('active');
            renderApps();
            renderPageDots();
        }

        async function resetAll() {
            if (!confirm('Réinitialiser toutes les pages et positions ?')) return;
            localStorage.removeItem('cactusPages');
            localStorage.removeItem('cactusCurrentPage');
            cachedPages = JSON.parse(JSON.stringify(defaultPages));
            currentPageId = 'main';

            // Reset on server too
            if (apiEnabled) {
                try {
                    await fetch(`${API_BASE}/preferences`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pages: cachedPages, currentPage: 'main' })
                    });
                } catch (e) {
                    console.error('Erreur reset API:', e);
                }
            }

            renderApps();
            renderPageDots();
            renderPageManager();
            renderAppToggles();
        }

        // ============ Drag and Drop ============
        let draggedEl = null;

        function setupDragAndDrop() {
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                card.addEventListener('dragstart', (e) => {
                    draggedEl = card;
                    setTimeout(() => card.classList.add('dragging'), 0);
                });

                card.addEventListener('dragend', () => {
                    card.classList.remove('dragging');
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
                    saveCurrentOrder();
                });

                card.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (card !== draggedEl) {
                        card.classList.add('drag-over');
                    }
                });

                card.addEventListener('dragleave', () => {
                    card.classList.remove('drag-over');
                });

                card.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (card !== draggedEl) {
                        const grid = document.getElementById('appGrid');
                        const allCards = [...grid.querySelectorAll('.card')];
                        const draggedIdx = allCards.indexOf(draggedEl);
                        const dropIdx = allCards.indexOf(card);

                        if (draggedIdx < dropIdx) {
                            card.after(draggedEl);
                        } else {
                            card.before(draggedEl);
                        }
                    }
                    card.classList.remove('drag-over');
                });
            });
        }

        function saveCurrentOrder() {
            const cards = document.querySelectorAll('#appGrid .card');
            const newOrder = [...cards].map(c => c.dataset.id);

            const pages = getPages();
            const currentPage = pages.find(p => p.id === currentPageId);
            if (currentPage) {
                currentPage.apps = newOrder;
                savePages(pages);
            }
        }

        // ============ Event Listeners ============
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.context-menu')) {
                hideContextMenu();
            }
        });

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // ============ Project View ============
        function openProjectView(projectId) {
            const project = projectsConfig[projectId];
            if (!project) return;

            currentProjectId = projectId;

            // Hide grid and show project view
            document.getElementById('appGrid').style.display = 'none';
            document.getElementById('pageNav').style.display = 'none';
            document.getElementById('projectView').classList.add('active');

            // Load terminal iframe
            const terminalUrl = baseUrl(project.terminalPort);
            document.getElementById('terminalFrame').src = terminalUrl;

            // Load issues and tasks
            loadProjectIssues(projectId);
            loadAgentTasks(projectId);

            // Add back button to top bar
            const topBar = document.querySelector('.top-bar');
            if (!document.getElementById('btnBack')) {
                const backBtn = document.createElement('button');
                backBtn.id = 'btnBack';
                backBtn.className = 'btn-back';
                backBtn.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                    Retour
                `;
                backBtn.onclick = closeProjectView;
                topBar.insertBefore(backBtn, topBar.firstChild);
            }
        }

        function closeProjectView() {
            currentProjectId = null;

            // Show grid and hide project view
            document.getElementById('appGrid').style.display = '';
            document.getElementById('pageNav').style.display = '';
            document.getElementById('projectView').classList.remove('active');

            // Clear terminal iframe
            document.getElementById('terminalFrame').src = '';

            // Remove back button
            const backBtn = document.getElementById('btnBack');
            if (backBtn) backBtn.remove();
        }

        // ============ Tmux Control ============
        const TMUX_API_PORT = 7691;
        let currentTmuxWindow = 1;

        async function switchTmuxWindow(windowNum) {
            const statusEl = document.getElementById('tmuxStatus');
            const buttons = document.querySelectorAll('.tmux-btn');

            // Update button states
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.dataset.window) === windowNum) {
                    btn.classList.add('active');
                }
            });

            statusEl.textContent = `Changement vers fenêtre ${windowNum}...`;
            statusEl.className = 'tmux-status';

            try {
                const response = await fetch(`http://${host}:${TMUX_API_PORT}/window/${windowNum}`, {
                    method: 'POST',
                    mode: 'cors'
                });

                if (response.ok) {
                    currentTmuxWindow = windowNum;
                    statusEl.textContent = `Fenêtre ${windowNum} active`;
                    statusEl.className = 'tmux-status success';

                    // Refresh the terminal iframe to show the new window
                    const iframe = document.getElementById('terminalFrame');
                    iframe.src = iframe.src;
                } else {
                    throw new Error('Erreur serveur');
                }
            } catch (err) {
                statusEl.textContent = `Erreur: API tmux non disponible (port ${TMUX_API_PORT})`;
                statusEl.className = 'tmux-status error';
                console.error('Tmux API error:', err);
            }

            // Clear status after 3 seconds
            setTimeout(() => {
                if (statusEl.textContent.includes('active') || statusEl.textContent.includes('Erreur')) {
                    statusEl.textContent = '';
                }
            }, 3000);
        }

        // ============ Issues Management ============
        function getProjectIssuesKey(projectId) {
            return `cactusIssues_${projectId}`;
        }

        function loadProjectIssues(projectId) {
            const saved = localStorage.getItem(getProjectIssuesKey(projectId));
            if (saved) {
                projectIssues[projectId] = JSON.parse(saved);
            } else {
                // Use default issues for this project if defined
                projectIssues[projectId] = defaultIssues[projectId] ?
                    JSON.parse(JSON.stringify(defaultIssues[projectId])) : [];
            }
            renderIssues();
        }

        function saveProjectIssues(projectId) {
            localStorage.setItem(getProjectIssuesKey(projectId), JSON.stringify(projectIssues[projectId] || []));
        }

        function renderIssues() {
            const container = document.getElementById('issuesList');
            const issues = projectIssues[currentProjectId] || [];

            if (issues.length === 0) {
                container.innerHTML = '<div class="empty-issues">Aucun problème signalé</div>';
                return;
            }

            // Sort: open issues first, then by priority
            const priorityOrder = { high: 0, medium: 1, low: 2 };
            const sortedIssues = [...issues].sort((a, b) => {
                if (a.status === 'resolved' && b.status !== 'resolved') return 1;
                if (a.status !== 'resolved' && b.status === 'resolved') return -1;
                return priorityOrder[a.priority] - priorityOrder[b.priority];
            });

            container.innerHTML = sortedIssues.map(issue => `
                <div class="issue-item ${issue.priority} ${issue.status === 'resolved' ? 'resolved' : ''}">
                    <div class="issue-header">
                        <span class="issue-title">${escapeHtml(issue.title)}</span>
                        <span class="issue-priority ${issue.priority}">${issue.priority}</span>
                    </div>
                    <div class="issue-desc">${escapeHtml(issue.description || '')}</div>
                    <div class="issue-actions">
                        <button onclick="editIssue('${issue.id}')">Éditer</button>
                        ${issue.status !== 'resolved'
                            ? `<button class="resolve" onclick="resolveIssue('${issue.id}')">Résoudre</button>`
                            : `<button onclick="reopenIssue('${issue.id}')">Rouvrir</button>`
                        }
                        <button class="delete" onclick="deleteIssue('${issue.id}')">Supprimer</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openIssueModal(issueId = null) {
            const modal = document.getElementById('issueModal');
            const titleEl = document.getElementById('issueModalTitle');

            if (issueId) {
                const issues = projectIssues[currentProjectId] || [];
                const issue = issues.find(i => i.id === issueId);
                if (issue) {
                    titleEl.textContent = 'Modifier le problème';
                    document.getElementById('issueId').value = issue.id;
                    document.getElementById('issueTitle').value = issue.title;
                    document.getElementById('issueDescription').value = issue.description || '';
                    document.getElementById('issuePriority').value = issue.priority;
                }
            } else {
                titleEl.textContent = 'Nouveau problème';
                document.getElementById('issueId').value = '';
                document.getElementById('issueTitle').value = '';
                document.getElementById('issueDescription').value = '';
                document.getElementById('issuePriority').value = 'medium';
            }

            modal.classList.add('active');
        }

        function closeIssueModal() {
            document.getElementById('issueModal').classList.remove('active');
        }

        function saveIssue() {
            const id = document.getElementById('issueId').value;
            const title = document.getElementById('issueTitle').value.trim();
            const description = document.getElementById('issueDescription').value.trim();
            const priority = document.getElementById('issuePriority').value;

            if (!title) {
                alert('Le titre est requis');
                return;
            }

            if (!projectIssues[currentProjectId]) {
                projectIssues[currentProjectId] = [];
            }

            if (id) {
                // Edit existing
                const index = projectIssues[currentProjectId].findIndex(i => i.id === id);
                if (index !== -1) {
                    projectIssues[currentProjectId][index] = {
                        ...projectIssues[currentProjectId][index],
                        title,
                        description,
                        priority
                    };
                }
            } else {
                // Create new
                projectIssues[currentProjectId].push({
                    id: 'issue_' + Date.now(),
                    title,
                    description,
                    priority,
                    status: 'open',
                    createdAt: new Date().toISOString()
                });
            }

            saveProjectIssues(currentProjectId);
            renderIssues();
            closeIssueModal();
        }

        function editIssue(issueId) {
            openIssueModal(issueId);
        }

        function resolveIssue(issueId) {
            const issues = projectIssues[currentProjectId] || [];
            const issue = issues.find(i => i.id === issueId);
            if (issue) {
                issue.status = 'resolved';
                issue.resolvedAt = new Date().toISOString();
                saveProjectIssues(currentProjectId);
                renderIssues();
            }
        }

        function reopenIssue(issueId) {
            const issues = projectIssues[currentProjectId] || [];
            const issue = issues.find(i => i.id === issueId);
            if (issue) {
                issue.status = 'open';
                delete issue.resolvedAt;
                saveProjectIssues(currentProjectId);
                renderIssues();
            }
        }

        function deleteIssue(issueId) {
            if (!confirm('Supprimer ce problème ?')) return;
            projectIssues[currentProjectId] = (projectIssues[currentProjectId] || []).filter(i => i.id !== issueId);
            saveProjectIssues(currentProjectId);
            renderIssues();
        }

        // ============ Agent Tasks ============
        function getAgentTasksKey(projectId) {
            return `cactusTasks_${projectId}`;
        }

        function loadAgentTasks(projectId) {
            const saved = localStorage.getItem(getAgentTasksKey(projectId));
            if (saved) {
                agentTasks[projectId] = JSON.parse(saved);
            } else {
                // Use default agent tasks for this project if defined
                agentTasks[projectId] = defaultAgentTasks[projectId] ?
                    JSON.parse(JSON.stringify(defaultAgentTasks[projectId])) : [];
            }
            renderAgentTasks();
        }

        function saveAgentTasks(projectId) {
            localStorage.setItem(getAgentTasksKey(projectId), JSON.stringify(agentTasks[projectId] || []));
        }

        function renderAgentTasks() {
            const container = document.getElementById('agentTasksList');
            const tasks = agentTasks[currentProjectId] || [];

            if (tasks.length === 0) {
                container.innerHTML = '<div class="empty-issues">Aucune tâche en cours</div>';
                return;
            }

            container.innerHTML = tasks.map(task => `
                <div class="agent-task-item ${task.status}">
                    <div class="agent-task-header">
                        <span class="agent-name">${escapeHtml(task.agent)}</span>
                        <span class="agent-status ${task.status}">${getStatusLabel(task.status)}</span>
                    </div>
                    <div class="agent-task-desc">${escapeHtml(task.task)}</div>
                </div>
            `).join('');
        }

        function getStatusLabel(status) {
            const labels = {
                pending: 'En attente',
                running: 'En cours',
                completed: 'Terminé'
            };
            return labels[status] || status;
        }

        // API to update agent tasks (can be called from external sources)
        window.updateAgentTask = function(projectId, agentName, taskDesc, status) {
            if (!agentTasks[projectId]) agentTasks[projectId] = [];

            const existingIndex = agentTasks[projectId].findIndex(t => t.agent === agentName);
            if (existingIndex !== -1) {
                agentTasks[projectId][existingIndex].task = taskDesc;
                agentTasks[projectId][existingIndex].status = status;
            } else {
                agentTasks[projectId].push({
                    id: 'task_' + Date.now(),
                    agent: agentName,
                    task: taskDesc,
                    status: status
                });
            }

            saveAgentTasks(projectId);
            if (currentProjectId === projectId) {
                renderAgentTasks();
            }
        };

        // API to add issue (can be called from external sources like Claude)
        window.addProjectIssue = function(projectId, title, description, priority = 'medium') {
            if (!projectIssues[projectId]) projectIssues[projectId] = [];

            projectIssues[projectId].push({
                id: 'issue_' + Date.now(),
                title,
                description,
                priority,
                status: 'open',
                createdAt: new Date().toISOString()
            });

            saveProjectIssues(projectId);
            if (currentProjectId === projectId) {
                renderIssues();
            }
        };

        // API to get issues (for Claude to read)
        window.getProjectIssues = function(projectId) {
            const saved = localStorage.getItem(getProjectIssuesKey(projectId));
            return saved ? JSON.parse(saved) : [];
        };

        // ============ Init ============
        async function init() {
            // Try to load from API first
            await loadPreferencesFromAPI();

            // If API didn't provide pages, get from localStorage
            if (!cachedPages) {
                cachedPages = getPages();
                currentPageId = getCurrentPageId();
            }

            // Validate currentPageId
            const pages = getPages();
            if (!pages.find(p => p.id === currentPageId)) {
                currentPageId = pages.length > 0 ? pages[0].id : 'main';
            }

            renderApps();
            renderPageDots();
        }

        init();
    </script>
</body>
</html>
